# This config file is used by ros2_control
controller_manager:
  ros__parameters:
    update_rate: 200  # Hz - Real-time control rate

    Alicia_controller:
      type: joint_trajectory_controller/JointTrajectoryController


    Gripper_controller:
      type: joint_trajectory_controller/JointTrajectoryController


    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

Alicia_controller:
  ros__parameters:
    joints:
      - Joint1
      - Joint2
      - Joint3
      - Joint4
      - Joint5
      - Joint6
    command_interfaces:
      - position
      - velocity
    state_interfaces:
      - position
      - velocity
    
    # Real-time control settings
    state_publish_rate: 200.0  # Publish state at controller update rate
    action_monitor_rate: 20.0   # Monitor action goal progress
    
    # Real-time velocity control enabled
    open_loop_control: false  # Use feedback for better control
    
    # Allow trajectory controller to interpolate between points
    allow_integration_in_goal_trajectories: true
    
    # Constraints for trajectory execution
    constraints:
      stopped_velocity_tolerance: 0.10  # Sim can oscillate near the final state
      goal_time: 10.0  # Give slow physics time to converge at the goal
      Joint1:
        trajectory: 0.50
        goal: 0.10
      Joint2:
        trajectory: 0.50
        goal: 0.10
      Joint3:
        trajectory: 0.50
        goal: 0.10
      Joint4:
        trajectory: 0.50
        goal: 0.10
      Joint5:
        trajectory: 0.50
        goal: 0.10
      Joint6:
        trajectory: 0.50
        goal: 0.10
Gripper_controller:
  ros__parameters:
    joints:
      - Gripper
    command_interfaces:
      - position
      - velocity
    state_interfaces:
      - position
      - velocity
joint_state_broadcaster:
  ros__parameters:
    publish_topic: "/joint_states"